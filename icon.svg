<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="white"/>
  
  <g transform="translate(10, 15)">
    <!-- 1. Blue Bottom-Left (Vertical Up) -->
    <path d="M170 380 L170 230" fill="none" stroke="#0054a6" stroke-width="44" stroke-linecap="round"/>
    <circle cx="170" cy="380" r="44" fill="#0054a6"/>

    <!-- 2. Yellow Main Trace (Top Left to Bottom Center) -->
    <path d="M150 120 L150 180 L260 320 L260 380" fill="none" stroke="#f9af00" stroke-width="44" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="150" cy="120" r="44" fill="#f9af00"/>
    <circle cx="260" cy="380" r="44" fill="#f9af00"/>

    <!-- 3. Blue Top Middle 1 (Short Vertical) -->
    <path d="M220 120 L220 180" fill="none" stroke="#0054a6" stroke-width="44" stroke-linecap="round"/>
    <circle cx="220" cy="120" r="44" fill="#0054a6"/>

    <!-- 4. Blue Top Middle 2 (Short Vertical) -->
    <path d="M290 120 L290 210" fill="none" stroke="#0054a6" stroke-width="44" stroke-linecap="round"/>
    <circle cx="290" cy="120" r="44" fill="#0054a6"/>

    <!-- 5. Blue Top Right to Bottom Right (Diagonal Out) -->
    <path d="M360 120 L360 200 L430 300 L430 380" fill="none" stroke="#0054a6" stroke-width="44" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="360" cy="120" r="44" fill="#0054a6"/>
    <circle cx="430" cy="380" r="44" fill="#0054a6"/>
  </g>

  <!-- Text: Inst. Electrotécnicas Alor -->
  <text x="256" y="475" font-family="Arial, sans-serif" font-size="31" font-weight="900" fill="#0054a6" text-anchor="middle" letter-spacing="-0.5">Inst. Electrotécnicas Alor</text>
</svg>
